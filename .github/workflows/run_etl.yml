name: Merchant Feed ETL

on:
  schedule:
    - cron: '0 5 * * *'   # 08:00 Romania (UTC+3 vara)
  workflow_dispatch:       # permite rulare manuala

permissions:
  contents: write

jobs:
  run-etl:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instaleaza dependente
        run: pip install -r requirements.txt

      - name: Ruleaza ETL
        env:
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          EMAIL_USER:       ${{ secrets.EMAIL_USER }}
          EMAIL_PASS:       ${{ secrets.EMAIL_PASS }}
          EMAIL_TO:         ${{ secrets.EMAIL_TO }}
        run: python etl_merchant_feed.py

      - name: Commit si push merchant_feed.xml
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add merchant_feed.xml
          git diff --staged --quiet || git commit -m "Update merchant feed $(date +%Y-%m-%d)"
          git push
